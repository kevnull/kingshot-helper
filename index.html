<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kingshot Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--s1:#1e293b;--s2:#334155;--bd:#475569;--tx:#e2e8f0;--mx:#94a3b8;--ac:#3b82f6}
body{background:var(--bg);color:var(--tx);font:14px/1.5 system-ui,sans-serif;min-height:100vh}
nav{display:flex;gap:4px;padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap;align-items:center}
.nb{background:transparent;border:1px solid var(--bd);color:var(--tx);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap}
.nb:hover{background:var(--s2)}.nb.active{background:var(--ac);border-color:var(--ac);color:#fff}
.ndw{position:relative}
.dm{position:absolute;top:calc(100% + 4px);left:0;background:var(--s1);border:1px solid var(--bd);border-radius:8px;min-width:210px;display:none;z-index:200;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.7);max-height:70vh;overflow-y:auto}
.dm.open{display:block}
.dmg{font-size:10px;text-transform:uppercase;color:var(--mx);padding:6px 8px 2px;letter-spacing:1px}
.dmi{display:block;width:100%;background:transparent;border:none;color:var(--tx);padding:7px 10px;border-radius:5px;cursor:pointer;text-align:left;font-size:13px}
.dmi:hover{background:var(--s2)}
.panel{display:none;padding:16px;max-width:1200px;margin:0 auto}
.panel.active{display:block}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card h3{font-size:15px;margin-bottom:6px}
.ar{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px}
.ay{background:#451a03;border:1px solid #92400e;color:#fde68a;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px}
.ab{background:#0c1a4a;border:1px solid #1e40af;color:#93c5fd;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px}
.ag{background:#052e16;border:1px solid #166534;color:#86efac;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px}
a.evl{color:var(--ac);text-decoration:none;cursor:pointer;border-bottom:1px dotted var(--ac)}
a.evl:hover{color:#60a5fa}
table.tasks{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
table.tasks th{text-align:left;padding:6px 10px;background:var(--s2);color:var(--mx);font-weight:500}
table.tasks td{padding:6px 10px;border-bottom:1px solid var(--s2)}
table.tasks tr:last-child td{border-bottom:none}
.evlo{display:grid;grid-template-columns:210px 1fr;gap:12px}
.evsb{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:8px;max-height:calc(100vh - 120px);overflow-y:auto}
.evbtn{display:block;width:100%;background:transparent;border:none;color:var(--tx);padding:8px 10px;border-radius:6px;cursor:pointer;text-align:left;font-size:13px;margin-bottom:2px}
.evbtn:hover{background:var(--s2)}.evbtn.sel{background:var(--ac);color:#fff}
.evgl{font-size:10px;text-transform:uppercase;color:var(--mx);padding:6px 10px 2px;letter-spacing:1px}
.evdt{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;max-height:calc(100vh - 120px);overflow-y:auto}
.srcl{display:inline-block;color:#60a5fa;text-decoration:none;font-size:12px;margin-top:4px;margin-right:8px;padding:3px 8px;background:#1e3a5f;border-radius:4px}
.srcl:hover{background:#1d4ed8}
.hmw{overflow-x:auto}.hm{border-collapse:collapse;font-size:12px;min-width:700px}
.hm th,.hm td{padding:6px 8px;border:1px solid var(--bd);text-align:center}
.hm th{background:var(--s2);color:var(--mx);font-weight:500;white-space:nowrap;font-size:11px}
.hm td.rn{text-align:left;font-size:12px;white-space:nowrap;background:var(--s1)}
.g4{background:#14532d;color:#86efac;font-weight:600}.g2{background:#1a3a2a;color:#6ee7b7}
.r2{background:#431407;color:#fb923c}.r4{background:#450a0a;color:#fca5a5;font-weight:600}
.h0{background:var(--s2);color:var(--bd)}
.leg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;align-items:center}
.li{display:flex;align-items:center;gap:5px}.ld{width:12px;height:12px;border-radius:2px}
.gw{overflow-x:auto;padding-bottom:8px}
.grow{display:flex;align-items:center;margin-bottom:4px}
.glbl{width:155px;flex-shrink:0;font-size:11px;color:var(--mx);text-align:right;padding-right:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gtrk{flex:1;height:26px;background:var(--s2);border-radius:4px;position:relative;min-width:480px}
.gbar{position:absolute;top:3px;height:20px;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:11px;overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .15s}
.gbar:hover{opacity:.8}
.srow{display:flex;align-items:center;margin-bottom:4px}
.slbl{width:155px;flex-shrink:0;font-size:12px;color:var(--tx);text-align:right;padding-right:10px}
.strk{flex:1;height:24px;background:var(--s2);border-radius:4px;position:relative;min-width:480px}
.sseg{position:absolute;top:2px;height:20px;border-radius:3px;display:flex;align-items:center;padding:0 5px;font-size:10px;overflow:hidden;white-space:nowrap;cursor:default}
#tt{position:fixed;display:none;background:#1e293b;border:1px solid #475569;border-radius:8px;padding:10px 14px;max-width:260px;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.7)}
#ttT{font-weight:600;font-size:13px;margin-bottom:2px}#ttD{font-size:11px;color:var(--mx);margin-bottom:6px}
#ttB{font-size:12px;line-height:1.5}
h2{font-size:18px;margin-bottom:12px}
.secl{font-size:11px;text-transform:uppercase;color:var(--mx);letter-spacing:1px;margin:16px 0 6px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;margin-left:6px;vertical-align:middle}
.ba{background:#14532d;color:#86efac}.bs{background:#422006;color:#fde68a}
.bf{background:#1e1b4b;color:#a5b4fc}.bk{background:#450a0a;color:#fca5a5}
.ggg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.kvk-box{background:linear-gradient(135deg,#450a0a,#7f1d1d);border:1px solid #991b1b;border-radius:12px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.kvk-title{font-size:13px;color:#fca5a5;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.kvk-sub{font-size:11px;color:#fca5a5;margin-top:2px}
.kvk-nums{display:flex;gap:12px;align-items:flex-end}
.kvk-unit{text-align:center}.kvk-n{font-size:26px;font-weight:700;color:#fff;line-height:1}
.kvk-l{font-size:10px;color:#fca5a5;text-transform:uppercase}
.ev-live{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:8px}
.ev-card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px 14px}
.ev-card.type-battle{border-left:3px solid #dc2626}
.ev-card.type-competition{border-left:3px solid #2563eb}
.ev-card.type-special{border-left:3px solid #d97706}
.ev-card h4{font-size:13px;font-weight:600;margin-bottom:3px}
.ev-card .dates{font-size:11px;color:var(--mx)}
.ev-card .strat-link{font-size:11px;color:var(--ac);cursor:pointer;border-bottom:1px dotted var(--ac);margin-top:4px;display:inline-block}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:5px;animation:pulse 2s infinite}
.stale-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f59e0b;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{background:transparent;border:1px solid var(--bd);color:var(--mx);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;margin-left:8px}
.refresh-btn:hover{background:var(--s2);color:var(--tx)}
.last-updated{font-size:11px;color:var(--mx);margin-left:6px}
@media(max-width:600px){.evlo{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <button class="nb active" id="tnow" onclick="showTab('now')">🔴 Now</button>
  <button class="nb" id="tres" onclick="showTab('resources')">📦 Resources</button>
  <div class="ndw" id="ndw">
    <button class="nb" id="tev" onclick="toggleDD(event)">📋 Events ▾</button>
    <div class="dm" id="evdd"></div>
  </div>
  <button class="nb" id="tgear" onclick="showTab('gear')">🛡️ Gear</button>
  <button class="nb" id="tset" onclick="showTab('settings')" style="margin-left:auto">⚙️</button>
</nav>

<div class="panel" id="panel-events"></div>

function getCookie(n){const v=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return v?decodeURIComponent(v.pop()):null;}
function setCookie(n,v,days=365){const d=new Date();d.setTime(d.getTime()+days*86400000);document.cookie=n+'='+encodeURIComponent(v)+';expires='+d.toUTCString()+';path=/';}
function getServerLaunchISO(){return getCookie('ks_server_launch')||null;}
function setServerLaunch(iso){setCookie('ks_server_launch',iso,730);}
function serverAgeDays(){const iso=getServerLaunchISO();if(!iso)return null;return Math.floor((Date.now()-new Date(iso).getTime())/86400000);}

// ===== EVENT LOOKUP HELPERS =====
function getEvent(id){ return EVENTS.find(e=>e.id===id)||null; }
function eventFromTitleKey(titleKey){ const id=KEY_MAP[titleKey]; return id?getEvent(id):null; }
function eventFromCalName(name){
  const nl=name.toLowerCase();
  const mk=Object.keys(CAL_MAP).find(k=>nl.includes(k));
  if(!mk) return {event:null,color:'#475569',id:'kvk'};
  const cm=CAL_MAP[mk];
  return {event:cm.id?getEvent(cm.id):null,color:cm.c,id:cm.id||'kvk'};
}
function isCalEventLocked(name,omit){ const nl=name.toLowerCase(); return Array.from(omit).some(o=>nl.includes(o)); }

// Derives live status for an event id from calendarData / liveData rather than trusting the static field.
// Returns: 'active' | 'soon' | 'kvk' | 'future'
function deriveEventStatus(id){
  if(id==='kvk') return 'kvk';
  const now=new Date(), soon=new Date(now.getTime()+7*86400000);
  // Check calendarData first (authoritative recurring schedule)
  if(calendarData&&calendarData.events){
    // Find cal key fragments that map to this event id
    const calKeys=Object.keys(CAL_MAP).filter(k=>CAL_MAP[k].id===id);
    // Also check by direct name match via eventFromCalName
    for(const ev of calendarData.events){
      const nl=ev.name.toLowerCase();
      const matches=calKeys.length?calKeys.some(k=>nl.includes(k)):false;
      if(!matches) continue;
      const s=new Date(ev.start), e=new Date(ev.end);
      if(s<=now&&now<e) return 'active';
      if(s>now&&s<=soon) return 'soon';
    }
  }
  // Fallback: check liveData active events
  if(liveData&&liveData.calendar){
    const mapped=Object.keys(KEY_MAP).find(k=>KEY_MAP[k]===id);
    if(mapped){
      const isActive=(liveData.calendar.activeEvents||[]).some(e=>e.titleKey===mapped);
      if(isActive) return 'active';
      const upcomingEv=(liveData.calendar.events||[]).find(e=>e.titleKey===mapped&&!e.isActive);
      if(upcomingEv&&new Date(upcomingEv.startUtc)<=soon) return 'soon';
    }
  }
  // Fall back to static status if no data available
  const ev=getEvent(id);
  return ev?ev.status:'future';
}

// ===== DATA FETCH =====
function fetchWithTimeout(url, ms=5000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

async function fetchLive(){
  try{
    const r=await fetchWithTimeout('./data/events.json?_='+Date.now());
    if(r.ok){
      liveData=await r.json();
      fetchedAt=liveData._fetchedAt?new Date(liveData._fetchedAt):new Date();
      return true;
    }
  }catch(e){}
  try{
    const r=await fetchWithTimeout('https://kingshot.net/api/events');
    if(r.ok){ liveData=await r.json(); fetchedAt=new Date(); return true; }
  }catch(e){}
  return false;
}

    if(r.ok){ calendarData=await r.json(); return true; }

}

async function fetchTimelineRules(){

// Returns set of calendar key fragments that are NOT yet unlocked for this server
function lockedCalendarKeys(kvkDay){
  const age=serverAgeDays();
  const locked=new Set();
  // Always omit clutter regardless of age
  ['merchant empire','svs ','tundra','pack:','kvk day','kvk castle','castle battle'].forEach(k=>locked.add(k));
  if(!timelineRules) return locked;
  timelineRules.eventUnlocks.forEach(rule=>{
    const key=rule.calendarKey;
    if(rule.unlockAfterEvent==='kvk'){
      // Locked until KvK has actually passed (kvkDay > 0 means KvK hasn't happened yet on this server if it's in the future)
      // kvkDay is days until KvK; if kvkDay > 0 the event hasn't happened yet
      if(kvkDay>0) locked.add(key);
    } else if(rule.unlockAfterEvent==='truegold_complete'){
      // Age of Truegold starts day 70; "completing" it takes additional time — lock while server age < 80
      if(age===null||age<80) locked.add(key);
    } else if(rule.unlockDayMin!==null&&(age===null||age<rule.unlockDayMin)){
      locked.add(key);
    }
  });
  return locked;
}

function fmtDate(iso){const d=new Date(iso),y=d.getFullYear(),ny=new Date().getFullYear();return d.toLocaleDateString('en-US',y!==ny?{month:'short',day:'numeric',year:'numeric'}:{month:'short',day:'numeric'});}
function ageStr(d){if(!d)return '';const m=Math.round((Date.now()-d.getTime())/60000);if(m<2)return 'just now';if(m<60)return `${m}m ago`;return `${Math.round(m/60)}h ago`;}

// ===== TIMELINE + RESOURCE SAVE (embedded in Now) =====
function buildTimelineHTML(){
  const base=new Date(); base.setHours(0,0,0,0);
  function dayOf(iso){return Math.round((new Date(iso)-base)/86400000);}
  function dayLabel(d){const dt=new Date(base);dt.setDate(dt.getDate()+d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  const kvkDay=liveData&&liveData.kvk?Math.round(liveData.kvk.timeLeft.total/86400):19;

  // Events not yet unlocked on this server (Gen 2, ~60 days old, pre-first-KvK):
  // - Alliance Brawl: unlocks after first KvK
  // - Officer Project: unlocks after completing Age of Truegold
  const OMIT=lockedCalendarKeys(kvkDay);

  let ganttEvs=[];
  if(calendarData&&calendarData.events&&calendarData.events.length){
    calendarData.events.forEach(ev=>{
      if(isCalEventLocked(ev.name,OMIT)) return;
      const nl=ev.name.toLowerCase();
      if(nl.includes('strongest governor')&&dayOf(ev.start)<kvkDay) return;
      if(nl.includes('kvk matchmaking')) return;
      const s=Math.max(0,dayOf(ev.start)), e2=dayOf(ev.end);
      if(e2<0||s>DAYS) return;
      const {color,id}=eventFromCalName(ev.name);
      ganttEvs.push({name:ev.name,s,e:e2,c:color,id});
    });
    ganttEvs.push({name:'KvK Matchmaking',s:kvkDay-2,e:kvkDay,c:'#991b1b',id:'kvk'});
    ganttEvs.push({name:'Kingdom vs Kingdom',s:kvkDay,e:kvkDay+6,c:'#7f1d1d',id:'kvk'});
  } else {
    if(liveData&&liveData.calendar){
      const calEvs=(liveData.calendar.events||[]).filter(e=>e.type!=='PACK');
      calEvs.forEach(ev=>{
        const s=Math.max(0,dayOf(ev.startUtc)),e2=dayOf(ev.endUtc)+1;
        if(e2<0||s>DAYS)return;
        const myEv=eventFromTitleKey(ev.titleKey);
        ganttEvs.push({name:ev.title,s,e:e2,c:TYPE_COLORS[ev.type]||'#475569',id:myEv?myEv.id:ev.titleKey});
      });
    }
    ganttEvs.push({name:'KvK Prep Phase',s:kvkDay-7,e:kvkDay,c:'#991b1b',id:'kvk'});
    ganttEvs.push({name:'Kingdom vs Kingdom',s:kvkDay,e:kvkDay+7,c:'#7f1d1d',id:'kvk'});
    ganttEvs.push({name:'Strongest Governor',s:kvkDay+14,e:kvkDay+28,c:'#92400e',id:'strongest-governor'});
  }

  const seen=new Set(); ganttEvs=ganttEvs.filter(e=>{const k=e.name+e.s;if(seen.has(k))return false;seen.add(k);return true;}).sort((a,b)=>a.s-b.s);
  const tickDays=[0,7,14,21,28];
  const src=calendarData?'Google Calendar':'estimated';
  let h=`<div class="secl" style="margin-top:20px">📅 30-Day Timeline <span style="font-size:11px;font-weight:400;color:var(--mx)">· ${src}</span></div>`;
  if(liveData||calendarData) h+=`<div class="ag" style="margin-bottom:12px">⚡ KvK in ~${kvkDay} days (${dayLabel(kvkDay)}) · <strong style="color:#fde68a">Alliance Brawl unlocks after your first KvK</strong></div>`;
  h+=`<div class="gw"><div class="grow" style="margin-bottom:2px"><div class="glbl"></div><div class="gtrk" style="height:20px;background:transparent">`;
  tickDays.forEach(d=>h+=`<div style="position:absolute;left:${(d/DAYS)*100}%;font-size:10px;color:var(--mx);transform:translateX(-50%)">${dayLabel(d)}</div>`);
  h+=`</div></div>`;
  ganttEvs.forEach(ev=>{
    const l=Math.max(0,(ev.s/DAYS)*100), w=Math.min(100-l,((ev.e-ev.s)/DAYS)*100);
    if(w<=0)return;
    const nm=ev.name.replace(/'/g,"\\'");
    h+=`<div class="grow"><div class="glbl">${ev.name}</div><div class="gtrk"><div class="gbar" style="left:${l}%;width:${w}%;background:${ev.c};color:#fff" onmouseenter="showTip(event,'${nm}','${dayLabel(ev.s)} – ${dayLabel(ev.e)}','')" onmousemove="moveTip(event)" onmouseleave="hideTip()" onclick="showEvent('${ev.id}')">${ev.name}</div></div></div>`;
  });
  h+=`</div><div class="secl" style="margin-top:20px">💰 Resource Save Windows</div><div class="gw">`;
  SAVE.forEach(row=>{
    h+=`<div class="srow"><div class="slbl">${row.name}</div><div class="strk">`;
    row.segs.forEach(seg=>{
      const l=(seg.s/DAYS)*100, w=((seg.e-seg.s)/DAYS)*100;
      h+=`<div class="sseg" style="left:${l}%;width:${w}%;background:${seg.bg};color:${seg.fg}" onmouseenter="showTip(event,'${row.name}','Days ${seg.s}–${seg.e}','${seg.tip}')" onmousemove="moveTip(event)" onmouseleave="hideTip()">${seg.l}</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  return h;
}

function renderEventDetail(ev){
  if(!ev)return '';
  const bm={active:'ba',soon:'bs',kvk:'bk',future:'bf'},bl={active:'Active',soon:'Soon',kvk:'KvK',future:'Future'};
  const st=deriveEventStatus(ev.id);
  let h=`<h2>${ev.emoji} ${ev.name} <span class="badge ${bm[st]||'bf'}">${bl[st]||'Future'}</span></h2>`;
  h+=`<p style="color:var(--mx);font-size:13px;margin-bottom:10px">${ev.desc}</p>`;
  if(ev.tip) h+=`<div class="ab" style="margin-bottom:10px">💡 ${ev.tip}</div>`;
  if(ev.strat) h+=`<div class="ay" style="margin-bottom:10px">🎯 ${ev.strat}</div>`;
  h+=`<div class="secl">Scoring Tasks</div><table class="tasks"><thead><tr><th>Action</th><th>Points</th></tr></thead><tbody>`;
  ev.tasks.forEach(t=>h+=`<tr><td>${t.a}</td><td style="color:#86efac;font-weight:600">${t.p}</td></tr>`);
  h+=`</tbody></table>`;
  if(ev.sources&&ev.sources.length){
    h+=`<div class="secl">Sources</div><div>`;
    ev.sources.forEach(s=>h+=`<a class="srcl" href="${s.u}" target="_blank">🔗 ${s.t}</a>`);
    h+=`</div>`;
  }
  return h;
}

// ===== GEAR TAB =====
function renderGear(){
  const el=document.getElementById('panel-gear');
  if(el.dataset.built)return; el.dataset.built='1';
  let h=`<h2>🛡️ Governor Gear</h2>`;
  h+=`<div class="ab" style="margin-bottom:12px">Specialize in <strong>one troop type</strong>. Never split across types.</div>`;
  h+=`<div class="ar" style="margin-bottom:12px">⚠️ Never gamble on &lt;100% rarity chance. Epic vs rare is a massive gap.</div>`;
  [{name:'🧵 Satin',desc:'Primary crafting material. Farm during Elysium events. Priority buy in the shop.'},{name:'🪡 Gilded Threads',desc:'Upgrade material. Use during Call of the Sovereign to upgrade pieces.'},{name:'🎨 Artisan\'s Vision',desc:'Required for high-tier crafts. Save for epic-rarity only.'},{name:'💠 Mythril Shards',desc:'Gear enhancement. Spend during Call of the Sovereign and KvK.'},{name:'👑 Governor Energy',desc:'Primary Call of the Sovereign resource. Stockpile between events.'},{name:'🛡️ Troop Specialization',desc:'Pick one: cavalry, infantry, or ranged. Build all gear for that type only.'}].forEach(t=>{
    h+=`<div class="card" style="margin-bottom:8px"><h3>${t.name}</h3><p style="color:var(--mx);font-size:13px">${t.desc}</p></div>`;
  });
  el.innerHTML=h;
}

// ===== SETTINGS =====
function renderSettings(){
  const el=document.getElementById('panel-settings');
  const iso=getServerLaunchISO();
  const age=serverAgeDays();
  // Convert stored UTC ISO to datetime-local value (which uses local time)
  function isoToInput(s){if(!s)return '';const d=new Date(s);return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);}
  const ageHtml=age!==null
    ?`<div class="ag" style="margin-top:10px">Server age: <strong>${age} days</strong> · launched ${new Date(iso).toUTCString()}</div>`
    :`<div class="ay" style="margin-top:10px">⚠️ No server launch date set — event unlock filtering is disabled.</div>`;
  el.innerHTML=`<h2>⚙️ Settings</h2>
  <div class="card">
    <h3>Server Launch Date</h3>
    <p style="color:var(--mx);font-size:13px;margin-bottom:12px">Used to calculate server age and filter events not yet unlocked. Times are in your local timezone — enter the launch time converted from UTC.</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="datetime-local" id="launch-input" value="${isoToInput(iso)}" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:6px;font-size:14px">
      <button onclick="saveLaunchDate()" style="background:var(--ac);border:none;color:#fff;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">Save</button>
      ${iso?`<button onclick="clearLaunchDate()" style="background:transparent;border:1px solid var(--bd);color:var(--mx);padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px">Clear</button>`:''}
    </div>
    ${ageHtml}
    <div id="settings-msg" style="margin-top:8px;font-size:13px"></div>
  </div>
  <div class="card" style="margin-top:10px">
    <h3>How server age is used</h3>
    <p style="color:var(--mx);font-size:13px">Events like Alliance Brawl and Officer Project are filtered from the timeline until your server meets their unlock conditions. The full unlock schedule is in <code style="background:var(--s2);padding:2px 5px;border-radius:3px">data/server-timeline.json</code>.</p>
  </div>`;
}
function saveLaunchDate(){
  const v=document.getElementById('launch-input').value;
  if(!v){document.getElementById('settings-msg').innerHTML='<span style="color:#fca5a5">Please enter a date.</span>';return;}
  const iso=new Date(v).toISOString(); // converts local time → UTC ISO
  setServerLaunch(iso);
  document.getElementById('settings-msg').innerHTML='<span style="color:#86efac">✓ Saved.</span>';
  setTimeout(()=>renderSettings(),800);
}
function clearLaunchDate(){
  setCookie('ks_server_launch','',0);
  renderSettings();
}

// ===== INIT =====
buildDropdown();
document.getElementById('panel-now').innerHTML=`<h2>🔴 Now</h2><div class="ab">⏳ Loading live event data…</div>`;
Promise.all([fetchLive(), fetchCalendar(), fetchTimelineRules()]).then(()=>{ showTab('now'); });
